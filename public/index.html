<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shiny Secrets — Today's Servers</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <style>
    :root {
      --bg: #0b0f17;
      --card: #121a27;
      --text: #e8eefc;
      --muted: #7b8fad;
      --border: rgba(255,255,255,.07);
      --accent: rgba(125,211,252,.18);
      --accent-border: rgba(125,211,252,.32);
      --pill-bg: rgba(255,255,255,.05);
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(ellipse 1100px 700px at 15% 0%, #111d2e 0%, var(--bg) 60%) fixed;
      color: var(--text);
      line-height: 1.4;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 32px 16px 48px;
    }
    .container {
      width: 100%;
      max-width: 560px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .15px;
      margin-bottom: 4px;
    }
    .clock {
      font-size: 13px;
      color: var(--muted);
      font-feature-settings: "tnum" 1;
      margin-bottom: 20px;
      padding-right: 120px;
    }
    .clock span { color: var(--text); font-weight: 600; }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .card + .card { margin-top: 14px; }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .servers {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .server {
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
      min-width: 54px;
      text-align: center;
      font-weight: 650;
      font-size: 14px;
      font-feature-settings: "tnum" 1;
      letter-spacing: .3px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--accent);
      color: var(--text);
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .btn:hover { background: rgba(125,211,252,.26); }
    .btn:active { transform: scale(.97); }
    .btn .copied {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(52,211,153,.2);
      border-radius: 10px;
      font-weight: 600;
      color: #6ee7b7;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }
    .btn .copied.show { opacity: 1; }

    .countdown {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      font-feature-settings: "tnum" 1;
    }
    .countdown span { color: var(--text); font-weight: 600; }

    /* Forecast */
    .forecast { margin-top: 0; }
    .forecast-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .forecast-row:last-child { border-bottom: none; padding-bottom: 0; }
    .forecast-row:first-child { padding-top: 0; }
    .forecast-date {
      font-size: 13px;
      font-weight: 600;
      min-width: 100px;
      font-feature-settings: "tnum" 1;
      flex-shrink: 0;
    }
    .forecast-label {
      font-size: 11px;
      color: var(--muted);
      min-width: 80px;
      flex-shrink: 0;
    }
    .forecast-servers {
      font-size: 12px;
      color: var(--muted);
      font-feature-settings: "tnum" 1;
      word-break: break-all;
    }

    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      opacity: .7;
    }
    .share-link {
      color: var(--muted);
      text-decoration: none;
      background: rgba(255,255,255,.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
      transition: color .15s;
    }
    .share-link:hover { color: var(--text); }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      transition: color .15s;
      opacity: .7;
    }
    .github-link:hover { color: var(--text); opacity: 1; }
    .github-link svg { fill: currentColor; flex-shrink: 0; }

    .lang-toggle {
      display: flex;
      gap: 4px;
      position: absolute;
      top: 32px;
      right: 16px;
    }
    .lang-btn {
      background: var(--pill-bg);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .3px;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent-border);
      color: var(--text);
    }
    .container { position: relative; }
  </style>
</head>
<body>
  <div class="container">
    <div class="lang-toggle" id="langToggle"></div>
    <h1>Shiny Secrets</h1>
    <div class="clock" id="clock">—</div>

    <div class="card">
      <div class="section-label"><span id="labelActive">Active servers</span> — <span id="activeDate">—</span></div>
      <div class="servers" id="servers"></div>
      <div class="actions">
        <button class="btn" id="copyFull" type="button">
          <span id="labelCopyFull">Copy full</span>
          <span class="copied" id="copiedFull">Copied!</span>
        </button>
        <button class="btn" id="copyShort" type="button">
          <span id="labelCopyShort">Copy short</span>
          <span class="copied" id="copiedShort">Copied!</span>
        </button>
      </div>
      <div class="countdown" id="countdown"></div>
    </div>

    <div class="card forecast">
      <div class="section-label" id="labelComingUp">Coming up</div>
      <div id="forecastBody"></div>
    </div>

    <div class="footer">
      <span id="labelShareable">Shareable link</span>: <a class="share-link" id="shareLink" href="#">—</a>
    </div>

    <div class="footer">
      <a class="github-link" href="https://github.com/Vladkarok/shiny" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span id="labelGithub">View on GitHub</span>
      </a>
    </div>
  </div>

<script>
  // ── Data ──────────────────────────────────────────────
  const GROUPS = [
    ["82","83","84","91","92","93","94","00","01","02","09","10","11"],
    ["85","86","87","95","96","03","04","12","13","14"],
    ["81","88","89","90","97","98","99","05","06","07"]
  ];
  const BASE = { y: 2026, m: 2, d: 20 }; // cycle day 0 = group 0
  // Rotation happens at 02:00 UTC every day (= 00:00 server time, year-round).
  // Using a fixed UTC hour eliminates all DST complexity.
  const ROTATION_HOUR_UTC = 2;

  // ── i18n ──────────────────────────────────────────────
  const LANGS = {
    en: {
      label: "EN",
      activeServers: "Active servers",
      copyFull: "Copy full",
      copyShort: "Copy short",
      copied: "Copied!",
      nextRotation: "Next rotation in",
      comingUp: "Coming up",
      tomorrow: "Tomorrow",
      dayAfter: "Day after",
      shareable: "Shareable link",
      github: "View on GitHub",
      days: ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
    },
    uk: {
      label: "UA",
      activeServers: "Активні сервери",
      copyFull: "Повне",
      copyShort: "Коротке",
      copied: "Скопійовано!",
      nextRotation: "Наступна ротація через",
      comingUp: "Далі буде",
      tomorrow: "Завтра",
      dayAfter: "Післязавтра",
      shareable: "Посилання",
      github: "Переглянути на GitHub",
      days: ["Нд","Пн","Вт","Ср","Чт","Пт","Сб"]
    },
    fr: {
      label: "FR",
      activeServers: "Serveurs actifs",
      copyFull: "Copie complète",
      copyShort: "Copie courte",
      copied: "Copié !",
      nextRotation: "Prochaine rotation dans",
      comingUp: "À venir",
      tomorrow: "Demain",
      dayAfter: "Après-demain",
      shareable: "Lien partageable",
      github: "Voir sur GitHub",
      days: ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"]
    }
  };

  let currentLang = localStorage.getItem("lang") || "en";

  function t(key) { return LANGS[currentLang][key]; }

  function applyLang() {
    document.documentElement.lang = currentLang;
    document.getElementById("labelActive").textContent = t("activeServers");
    document.getElementById("labelCopyFull").textContent = t("copyFull");
    document.getElementById("labelCopyShort").textContent = t("copyShort");
    document.getElementById("copiedFull").textContent = t("copied");
    document.getElementById("copiedShort").textContent = t("copied");
    document.getElementById("labelComingUp").textContent = t("comingUp");
    document.getElementById("labelShareable").textContent = t("shareable");
    document.getElementById("labelGithub").textContent = t("github");

    // Update toggle button active states
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.lang === currentLang);
    });

    // Re-render dynamic content with new language
    renderServers();
  }

  // Build language toggle buttons
  (function buildLangToggle() {
    const wrap = document.getElementById("langToggle");
    Object.keys(LANGS).forEach(code => {
      const btn = document.createElement("button");
      btn.className = "lang-btn";
      btn.dataset.lang = code;
      btn.textContent = LANGS[code].label;
      btn.addEventListener("click", () => {
        currentLang = code;
        localStorage.setItem("lang", code);
        applyLang();
      });
      wrap.appendChild(btn);
    });
  })();

  // ── Helpers ───────────────────────────────────────────
  function toUTCms(y, m, d) { return Date.UTC(y, m - 1, d); }
  function pad2(n) { return String(n).padStart(2, "0"); }
  function formatYMD(y, m, d) { return `${y}-${pad2(m)}-${pad2(d)}`; }

  function parseYMD(s) {
    const [y, m, d] = s.split("-").map(Number);
    return { y, m, d };
  }

  function addDays(ymd, n) {
    const { y, m, d } = parseYMD(ymd);
    const dt = new Date(toUTCms(y, m, d) + n * 86400000);
    return formatYMD(dt.getUTCFullYear(), dt.getUTCMonth() + 1, dt.getUTCDate());
  }

  function serversForDate(ymd) {
    const { y, m, d } = parseYMD(ymd);
    const diff = Math.floor((toUTCms(y, m, d) - toUTCms(BASE.y, BASE.m, BASE.d)) / 86400000);
    const idx = ((diff % 3) + 3) % 3;
    return GROUPS[idx];
  }

  function fullNumber(s) {
    const n = parseInt(s, 10);
    return n <= 14 ? `14${pad2(n)}` : `13${s}`;
  }

  // Effective rotation date: before 02:00 UTC = previous day's servers
  function effectiveDate() {
    const now = new Date();
    const uh = now.getUTCHours();
    let ymd = formatYMD(now.getUTCFullYear(), now.getUTCMonth() + 1, now.getUTCDate());
    if (uh < ROTATION_HOUR_UTC) {
      ymd = addDays(ymd, -1);
    }
    return ymd;
  }

  // ── Rendering ─────────────────────────────────────────
  let currentEffective = null;
  let overrideDate = null; // from URL param

  function getDisplayDate() {
    return overrideDate || effectiveDate();
  }

  function renderServers() {
    const ymd = getDisplayDate();
    currentEffective = ymd;
    const servers = serversForDate(ymd);

    // Active date label
    document.getElementById("activeDate").textContent = ymd;

    // Server pills
    const wrap = document.getElementById("servers");
    wrap.innerHTML = "";
    servers.forEach(s => {
      const el = document.createElement("div");
      el.className = "server";
      el.textContent = fullNumber(s);
      wrap.appendChild(el);
    });

    // Shareable link
    const shareLink = document.getElementById("shareLink");
    const shareUrl = new URL(location.href);
    shareUrl.searchParams.set("date", ymd);
    shareLinkUrl = shareUrl.toString();
    shareLink.href = shareLinkUrl;
    shareLink.textContent = shareLinkUrl;

    // Forecast: tomorrow & day after
    const forecastBody = document.getElementById("forecastBody");
    forecastBody.innerHTML = "";
    const labels = [t("tomorrow"), t("dayAfter")];
    for (let i = 1; i <= 2; i++) {
      const fDate = addDays(ymd, i);
      const fServers = serversForDate(fDate);
      const row = document.createElement("div");
      row.className = "forecast-row";
      row.innerHTML = `
        <span class="forecast-label">${labels[i - 1]}</span>
        <span class="forecast-date">${fDate}</span>
        <span class="forecast-servers">${fServers.map(fullNumber).join(" / ")}</span>
      `;
      forecastBody.appendChild(row);
    }
  }

  // Next rotation: next occurrence of 02:00 UTC (trivial with fixed UTC)
  function nextRotationMs() {
    const now = Date.now();
    const d = new Date(now);
    const todayRotation = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), ROTATION_HOUR_UTC);
    return now < todayRotation ? todayRotation : todayRotation + 86400000;
  }

  // Get user's local timezone abbreviation (e.g. EST, CET, CEST)
  function localTZAbbr() {
    return new Intl.DateTimeFormat("en-US", { timeZoneName: "short" })
      .formatToParts(new Date())
      .find(p => p.type === "timeZoneName").value;
  }

  function renderClock() {
    const now = new Date();
    const dayName = t("days")[now.getDay()];
    const y = now.getFullYear();
    const m = now.getMonth() + 1;
    const d = now.getDate();
    const h = now.getHours();
    const min = now.getMinutes();
    const sec = now.getSeconds();
    const tz = localTZAbbr();

    document.getElementById("clock").innerHTML =
      `<span>${dayName}, ${formatYMD(y, m, d)}</span> &nbsp;${pad2(h)}:${pad2(min)}:${pad2(sec)} ${tz}`;

    // Countdown to next rotation
    if (!overrideDate) {
      const msLeft = Math.max(0, nextRotationMs() - now.getTime());
      const totalSecs = Math.floor(msLeft / 1000);
      const rh = Math.floor(totalSecs / 3600);
      const rm = Math.floor((totalSecs % 3600) / 60);
      const rs = totalSecs % 60;
      document.getElementById("countdown").innerHTML =
        `${t("nextRotation")} <span>${pad2(rh)}:${pad2(rm)}:${pad2(rs)}</span>`;
    } else {
      document.getElementById("countdown").textContent = "";
    }

    // Auto-update: check if effective date changed
    if (!overrideDate) {
      const eff = effectiveDate();
      if (eff !== currentEffective) {
        renderServers();
      }
    }
  }

  // ── Copy ──────────────────────────────────────────────
  async function clipCopy(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
  }

  function copyText(text, indicatorId) {
    const indicator = document.getElementById(indicatorId);
    clipCopy(text).then(() => {
      indicator.classList.add("show");
      setTimeout(() => indicator.classList.remove("show"), 1200);
    });
  }

  document.getElementById("copyFull").addEventListener("click", () => {
    const ymd = getDisplayDate();
    const servers = serversForDate(ymd);
    const text = `${ymd}: ${servers.map(fullNumber).join("/")}`;
    copyText(text, "copiedFull");
  });

  document.getElementById("copyShort").addEventListener("click", () => {
    const servers = serversForDate(getDisplayDate());
    copyText(servers.join("/"), "copiedShort");
  });

  // Shareable link: copy on click, flash "Copied!" text
  let shareLinkUrl = "";
  document.getElementById("shareLink").addEventListener("click", (e) => {
    e.preventDefault();
    if (!shareLinkUrl) return;
    const link = document.getElementById("shareLink");
    const original = link.textContent;
    clipCopy(shareLinkUrl).then(() => {
      link.textContent = t("copied");
      setTimeout(() => { link.textContent = original; }, 1500);
    });
  });

  // ── Init ──────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const paramDate = params.get("date");
  if (paramDate && /^\d{4}-\d{2}-\d{2}$/.test(paramDate)) {
    overrideDate = paramDate;
  }

  applyLang();
  renderClock();
  setInterval(renderClock, 1000);
</script>
</body>
</html>
