name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (must already exist in GHCR). Leave as 'latest' to redeploy the current latest."
        required: true
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push web image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Substitute version in index.html
        run: sed -i 's/__VERSION__/${{ github.ref_name }}/' public/index.html

      - name: Build and push web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/shiny-web:latest
            ghcr.io/${{ env.OWNER }}/shiny-web:${{ github.ref_name }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to vprojects
    runs-on: [self-hosted, shiny]
    needs: build
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Copy docker-compose.yml to vprojects
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes vprojects 'mkdir -p ~/shiny'
          scp -o BatchMode=yes docker-compose.yml vprojects:~/shiny/docker-compose.yml

      - name: Pull and restart shiny on vprojects
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes vprojects \
            GHCR_TOKEN="$GHCR_TOKEN" \
            GHCR_USER="$GHCR_USER" \
            IMAGE_TAG="$IMAGE_TAG" \
            bash -s <<'REMOTE'
          set -euo pipefail
          cd ~/shiny
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          export IMAGE_TAG
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          docker compose ps
          REMOTE
