name: Deploy

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Substitute version in index.html
        run: sed -i 's/__VERSION__/${{ github.ref_name }}/' public/index.html

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shiny-web:latest
            ghcr.io/${{ github.repository_owner }}/shiny-web:${{ github.ref_name }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: caddy.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shiny-caddy:latest
            ghcr.io/${{ github.repository_owner }}/shiny-caddy:${{ github.ref_name }}
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 5m
          envs: GHCR_TOKEN,IMAGE_TAG
          script: |
            cd ~/shiny
            git restore .
            git fetch --tags
            git checkout ${{ github.ref_name }}
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            docker compose pull
            docker compose up -d
