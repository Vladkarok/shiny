services:
  web:
    image: ghcr.io/vladkarok/shiny-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    read_only: true
    mem_limit: 128m
    cap_drop:
      - ALL
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp:uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    ports:
      - "10.0.88.3:8080:8080"
